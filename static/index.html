<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Ticket Classifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0c;
    --bg2: #111116;
    --bg3: #18181f;
    --border: #2a2a35;
    --border2: #3a3a48;
    --text: #e8e8f0;
    --text2: #8888a0;
    --text3: #55556a;
    --accent: #4f8ef7;
    --accent2: #2a5cd4;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --purple: #a78bfa;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,10,12,0.9);
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    border: 1px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .logo-icon::before {
    content: '';
    position: absolute;
    inset: 3px;
    background: var(--accent);
    opacity: 0.15;
  }

  .logo-icon svg { position: relative; z-index: 1; }

  .logo-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
  }

  .logo-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    margin-top: 1px;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text3);
    transition: background 0.3s;
  }

  .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.offline { background: var(--red); }

  main {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 3rem 2rem;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    align-items: start;
  }

  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    opacity: 0.5;
  }

  .panel-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
  }

  .panel-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    margin-left: auto;
  }

  .panel-body { padding: 1.25rem; }

  textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    padding: 1rem;
    resize: vertical;
    min-height: 180px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea::placeholder { color: var(--text3); }

  textarea:focus { border-color: var(--border2); }

  .model-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 1rem;
  }

  .model-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  select {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    outline: none;
    cursor: pointer;
  }

  select:focus { border-color: var(--border2); }

  .btn-classify {
    width: 100%;
    margin-top: 1rem;
    padding: 12px;
    background: var(--accent2);
    border: 1px solid var(--accent);
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-classify:hover { background: var(--accent); }
  .btn-classify:active { transform: scale(0.99); }
  .btn-classify:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-classify .btn-loading {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-classify.loading .btn-text { display: none; }
  .btn-classify.loading .btn-loading { display: flex; }

  .spinner {
    width: 12px;
    height: 12px;
    border: 1.5px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .examples {
    margin-top: 1rem;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .examples-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 2px;
  }

  .example-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 6px 10px;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    line-height: 1.5;
  }

  .example-btn:hover { border-color: var(--border2); color: var(--text2); }

  /* Results */
  .result-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1rem;
    gap: 12px;
    opacity: 0.3;
  }

  .result-empty svg { opacity: 0.5; }

  .result-empty-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    line-height: 1.6;
  }

  .result-grid {
    display: none;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
  }

  .result-grid.visible { display: flex; }

  .result-row {
    display: flex;
    align-items: flex-start;
    gap: 0;
    background: var(--bg2);
  }

  .result-key {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 10px 12px;
    min-width: 110px;
    border-right: 1px solid var(--border);
    background: var(--bg3);
    line-height: 1.5;
  }

  .result-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text);
    padding: 10px 14px;
    flex: 1;
    line-height: 1.5;
  }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
  }

  .badge-critical { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
  .badge-high { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
  .badge-medium { background: rgba(79,142,247,0.15); color: #4f8ef7; border: 1px solid rgba(79,142,247,0.3); }
  .badge-low { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
  .badge-conf-high { background: rgba(34,197,94,0.12); color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
  .badge-conf-medium { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.25); }
  .badge-conf-low { background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }
  .badge-category { background: rgba(167,139,250,0.12); color: #a78bfa; border: 1px solid rgba(167,139,250,0.25); }
  .badge-team { background: rgba(79,142,247,0.1); color: #7ab0fa; border: 1px solid rgba(79,142,247,0.2); }

  .error-msg {
    display: none;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25);
    color: #ef4444;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 12px;
    line-height: 1.6;
    margin-top: 1rem;
  }

  .error-msg.visible { display: block; }

  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,10,12,0.9);
  }

  .footer-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.06em;
  }

  .tag-row {
    display: flex;
    gap: 8px;
  }

  .tech-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    border: 1px solid var(--border);
    padding: 2px 7px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  @media (max-width: 680px) {
    main { grid-template-columns: 1fr; padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="6" height="6" stroke="#4f8ef7" stroke-width="1"/>
        <rect x="9" y="1" width="6" height="6" stroke="#4f8ef7" stroke-width="1" opacity="0.5"/>
        <rect x="1" y="9" width="6" height="6" stroke="#4f8ef7" stroke-width="1" opacity="0.5"/>
        <rect x="9" y="9" width="6" height="6" stroke="#4f8ef7" stroke-width="1"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Ticket Classifier</div>
      <div class="logo-sub">IT Helpdesk · AI-powered triage</div>
    </div>
  </div>
  <div class="status-badge">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">checking ollama...</span>
  </div>
</header>

<main>
  <div class="panel">
    <div class="panel-header">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1h10M1 4h7M1 7h9M1 10h5" stroke="#55556a" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span class="panel-title">Ticket input</span>
      <span class="panel-num">01</span>
    </div>
    <div class="panel-body">
      <textarea id="ticketInput" placeholder="Paste the ticket text here...&#10;&#10;e.g. 'User cannot log in to Salesforce since this morning, getting error 403. Affects the entire sales team of 12 people.'" rows="8"></textarea>

      <div class="model-row">
        <span class="model-label">Model</span>
        <select id="modelSelect">
          <option value="qwen2.5:latest">qwen2.5:latest</option>
        </select>
      </div>

      <button class="btn-classify" id="classifyBtn" onclick="classify()">
        <span class="btn-text">▶ Classify ticket</span>
        <span class="btn-loading"><span class="spinner"></span> Analyzing...</span>
      </button>

      <div class="error-msg" id="errorMsg"></div>

      <div class="examples">
        <div class="examples-label">Examples →</div>
        <button class="example-btn" onclick="loadExample(0)">
          User cannot access Salesforce — 403 error, whole sales team affected since 9am
        </button>
        <button class="example-btn" onclick="loadExample(1)">
          Laptop screen flickering randomly, happens every 30 minutes, started after Windows update
        </button>
        <button class="example-btn" onclick="loadExample(2)">
          Suspicious email received with attachment — user clicked it by mistake, possible phishing
        </button>
        <button class="example-btn" onclick="loadExample(3)">
          Production DB response time went from 50ms to 8000ms, all services affected, clients complaining
        </button>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="#55556a" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span class="panel-title">Classification result</span>
      <span class="panel-num">02</span>
    </div>
    <div class="panel-body" style="padding:0">

      <div class="result-empty" id="resultEmpty">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect x="8" y="8" width="24" height="24" stroke="#55556a" stroke-width="1"/>
          <path d="M14 20h12M20 14v12" stroke="#55556a" stroke-width="1" stroke-linecap="round"/>
        </svg>
        <div class="result-empty-text">Submit a ticket<br>to see the analysis</div>
      </div>

      <div class="result-grid" id="resultGrid">
        <div class="result-row">
          <div class="result-key">Category</div>
          <div class="result-val" id="rCategory">—</div>
        </div>
        <div class="result-row">
          <div class="result-key">Priority</div>
          <div class="result-val" id="rPriority">—</div>
        </div>
        <div class="result-row">
          <div class="result-key">Team</div>
          <div class="result-val" id="rTeam">—</div>
        </div>
        <div class="result-row">
          <div class="result-key">Confidence</div>
          <div class="result-val" id="rConfidence">—</div>
        </div>
        <div class="result-row">
          <div class="result-key">Summary</div>
          <div class="result-val" id="rSummary" style="font-size:11px;color:#8888a0">—</div>
        </div>
        <div class="result-row">
          <div class="result-key">Reasoning</div>
          <div class="result-val" id="rReasoning" style="font-size:11px;color:#8888a0;line-height:1.7">—</div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <span class="footer-text">IT Ticket Classifier · Portfolio project</span>
  <div class="tag-row">
    <span class="tech-tag">FastAPI</span>
    <span class="tech-tag">Ollama</span>
    <span class="tech-tag">Python</span>
  </div>
</footer>

<script>
const EXAMPLES = [
  "User cannot access Salesforce since 9am, getting a 403 Forbidden error. Affects the entire sales team of 12 people. They have a client presentation in 2 hours.",
  "My laptop screen starts flickering randomly about every 30 minutes. It started after yesterday's Windows update. It's annoying but I can still work if I adjust the brightness.",
  "I received a suspicious email pretending to be from IT asking me to verify my credentials. I accidentally clicked the attachment before realizing it might be phishing. Please advise.",
  "Our production database response time jumped from ~50ms to 8000ms. All dependent services are throwing timeouts. Multiple clients are calling to complain. Started 20 minutes ago."
];

function loadExample(i) {
  document.getElementById('ticketInput').value = EXAMPLES[i];
  hideError();
}

function hideError() {
  const e = document.getElementById('errorMsg');
  e.textContent = '';
  e.classList.remove('visible');
}

function showError(msg) {
  const e = document.getElementById('errorMsg');
  e.textContent = '⚠ ' + msg;
  e.classList.add('visible');
}

function priorityBadge(p) {
  const map = { Critical: 'critical', High: 'high', Medium: 'medium', Low: 'low' };
  const k = map[p] || 'medium';
  return `<span class="badge badge-${k}">${p}</span>`;
}

function confBadge(c) {
  const map = { High: 'high', Medium: 'medium', Low: 'low' };
  const k = map[c] || 'medium';
  return `<span class="badge badge-conf-${k}">${c}</span>`;
}

async function classify() {
  const text = document.getElementById('ticketInput').value.trim();
  if (!text) { showError('Please enter ticket text first.'); return; }

  const model = document.getElementById('modelSelect').value;
  const btn = document.getElementById('classifyBtn');
  hideError();
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch('/classify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, model })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Unknown error');
    }

    const data = await res.json();
    showResult(data);
  } catch (err) {
    showError(err.message);
    document.getElementById('resultEmpty').style.display = 'flex';
    document.getElementById('resultGrid').classList.remove('visible');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function showResult(d) {
  document.getElementById('resultEmpty').style.display = 'none';
  document.getElementById('resultGrid').classList.add('visible');
  document.getElementById('rCategory').innerHTML = `<span class="badge badge-category">${d.category}</span>`;
  document.getElementById('rPriority').innerHTML = priorityBadge(d.priority);
  document.getElementById('rTeam').innerHTML = `<span class="badge badge-team">${d.team}</span>`;
  document.getElementById('rConfidence').innerHTML = confBadge(d.confidence);
  document.getElementById('rSummary').textContent = d.summary;
  document.getElementById('rReasoning').textContent = d.reasoning;
}

async function checkHealth() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  try {
    const res = await fetch('/health');
    const data = await res.json();
    if (data.ollama === 'connected') {
      dot.className = 'status-dot online';
      txt.textContent = 'ollama · connected';
    } else {
      dot.className = 'status-dot offline';
      txt.textContent = 'ollama · disconnected';
    }
  } catch {
    dot.className = 'status-dot offline';
    txt.textContent = 'server · unreachable';
  }
}

async function loadModels() {
  try {
    const res = await fetch('/models');
    const data = await res.json();
    const sel = document.getElementById('modelSelect');
    sel.innerHTML = '';
    data.models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      sel.appendChild(opt);
    });
  } catch {}
}

document.getElementById('ticketInput').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') classify();
});

checkHealth();
loadModels();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
