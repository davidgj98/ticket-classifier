services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  ticket-classifier:
    build: .
    container_name: ticket-classifier
    ports:
      - "8000:8000"
    environment:
      TICKET_OLLAMA_URL: "http://ollama:11434"
      TICKET_DEFAULT_MODEL: "qwen2.5:3b"
      TICKET_LOG_LEVEL: "INFO"
      TICKET_DATABASE_URL: "sqlite+aiosqlite:///data/history.db"
    volumes:
      - ticket_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  ticket_data:
